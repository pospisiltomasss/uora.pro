<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uora | Děkujeme</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #121212;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --brand-gold: #dca326;
            --brand-red: #a63223;
            --border-color: #222222;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            line-height: 1.6;
        }

        .thank-you-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 60px 40px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .icon-wrap {
            margin-bottom: 25px;
        }

        .icon-wrap svg {
            width: 65px;
            height: 65px;
            color: var(--brand-gold);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        p {
            color: var(--text-muted);
            font-size: 1.05rem;
            font-weight: 300;
            margin-bottom: 40px;
        }

        .btn-back {
            display: inline-block;
            background: transparent;
            border: 1px solid var(--brand-gold);
            color: var(--brand-gold);
            padding: 14px 35px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: var(--brand-gold);
            color: #000;
        }
    </style>
</head>
<body>

    <div class="thank-you-box">
        <div class="icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        
        <h1 id="headline">...</h1>
        <p id="message">...</p>
        
        <a href="./" id="btnBack" class="btn-back">Zpět</a>
    </div>

    <script>
        // --- JAZYKOVÉ MUTACE PODLE TYPU FORMULÁŘE ---
        const translations = {
            configurator: {
                cz: {
                    title: "Děkujeme za konfiguraci",
                    text: "Vaše požadavky jsme úspěšně přijali. Detaily si pečlivě projdeme a co nejdříve se vám ozveme zpět s návrhem řešení.",
                    btn: "Zpět na hlavní web"
                },
                en: {
                    title: "Thank You for the Request",
                    text: "We have successfully received your configuration. We will review the details and get back to you as soon as possible with a proposal.",
                    btn: "Back to Main Website"
                },
                de: {
                    title: "Vielen Dank für die Anfrage",
                    text: "Wir haben Ihre Konfiguration erfolgreich erhalten. Wir werden die Details prüfen und uns so schnell wie möglich mit einem Vorschlag bei Ihnen melden.",
                    btn: "Zurück zur Hauptwebsite"
                }
            },
            newsletter: {
                cz: {
                    title: "Skvělé, jste v seznamu!",
                    text: "Děkujeme za odběr. Od teď vám neutečou žádné exkluzivní rady o vizuálním marketingu, tvorbě filmového obsahu a budování brandu.",
                    btn: "Zpět na hlavní web"
                },
                en: {
                    title: "Awesome, you're in!",
                    text: "Thank you for subscribing. From now on, you won't miss any exclusive insights on visual marketing and content creation.",
                    btn: "Back to Main Website"
                },
                de: {
                    title: "Großartig, Sie sind dabei!",
                    text: "Vielen Dank für Ihr Abonnement. Ab sofort verpassen Sie keine exklusiven Einblicke in Videomarketing und Inhaltserstellung mehr.",
                    btn: "Zurück zur Hauptwebsite"
                }
            }
        };

        // 1. Načtení parametrů z URL adresy (?lang=cz&type=configurator)
        const urlParams = new URLSearchParams(window.location.search);
        
        // Rozpoznání jazyka (výchozí: cz)
        let lang = urlParams.get('lang');
        if (!lang || !['cz', 'en', 'de'].includes(lang)) {
            lang = 'cz'; 
        }

        // Rozpoznání typu (výchozí: configurator)
        let type = urlParams.get('type');
        if (!type || !translations[type]) {
            type = 'configurator';
        }

        // 2. Výběr správných textů podle typu a jazyka
        const content = translations[type][lang];

        // 3. Vložení textů do stránky
        document.getElementById('headline').innerText = content.title;
        document.getElementById('message').innerText = content.text;
        
        // 4. Úprava tlačítka Zpět
        const btnBack = document.getElementById('btnBack');
        btnBack.innerText = content.btn;
        
        // Tlačítko odkáže na kořenový adresář hlavního webu a předá mu parametr zvoleného jazyka
        btnBack.href = "./index.html?lang=" + lang;
    </script>
</body>
</html>
