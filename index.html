<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test webu</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #2ecc71;
            margin-top: 0;
        }
        p {
            color: #555;
            line-height: 1.6;
        }
        .badge {
            background-color: #2ecc71;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🎉 Hurá! Funguje to!</h1>
        <p>Tento web úspěšně běží na GitHub Pages a vaší vlastní doméně.</p>
        <p>Teď už sem můžete nahrát ostré soubory od Claude.</p>
        <span class="badge">Status: Online</span>
    </div>

</body>
</html>
