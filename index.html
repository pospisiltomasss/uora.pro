<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uora.pro - Něco se chystá</title>
    <style>
        /* Základní nastavení stránky */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9f9f9;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Společný styl pro horní a spodní lištu */
        .bar {
            background-color: #DAA520; /* Žlutá barva DAA520 */
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            font-weight: 500;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Horní lišta */
        header {
            position: relative;
            justify-content: center; /* Vycentruje čas na střed */
            min-height: 50px;
        }
        
        /* Jazyky posunuté úplně doprava uvnitř lišty */
        .lang-switch {
            position: absolute;
            right: 20px;
        }
        
        /* Styl pro přepínač jazyků */
        .lang-switch select {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            outline: none;
            transition: background 0.3s;
        }
        .lang-switch select:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .lang-switch select option {
            color: #333;
            background: white;
        }

        /* Styl pro živé datum a čas uprostřed */
        #datetime {
            font-size: 14px;
            letter-spacing: 0.5px;
            text-align: center;
        }

        /* Hlavní středový obsah */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
        }

        /* Krátký nadpis */
        h1 {
            font-size: 2.8rem;
            margin-bottom: 25px;
            color: #222;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Točící se kolečko (Loader) */
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #DAA520;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            animation: spin 1s linear infinite;
            margin-bottom: 60px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Styl pro SVG logo */
        .logo-placeholder {
            width: 100%;
            max-width: 250px;
            height: auto;
            display: block;
        }

        /* Spodní lišta vycentrovaná */
        footer {
            justify-content: center;
            font-size: 14px;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.05);
            text-align: center;
        }
    </style>
</head>
<body>

    <header class="bar">
        <div id="datetime">Načítání času...</div>
        
        <div class="lang-switch">
            <select id="languageSelect" onchange="changeLanguage()">
                <option value="cs">CZ</option>
                <option value="en">EN</option>
            </select>
        </div>
    </header>

    <main>
        <h1 id="headline">Něco se chystá</h1>
        
        <div class="loader"></div>
        
        <img class="logo-placeholder" src="logo.svg" alt="Naše Logo" id="webLogo" onerror="handleLogoError()">
    </main>

    <footer class="bar">
        <p>© 2025 - 2026 Všechna práva vyhrazena</p>
    </footer>

    <script>
        function updateDateTime() {
            const datetimeElement = document.getElementById('datetime');
            const langSelect = document.getElementById('languageSelect');
            
            if (!datetimeElement || !langSelect) return;

            const now = new Date();
            const lang = langSelect.value;

            const monthsCs = ["ledna", "února", "března", "dubna", "května", "června", "července", "srpna", "září", "října", "listopadu", "prosince"];
            const monthsEn = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

            const day = now.getDate();
            const year = now.getFullYear();
            
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            let formattedDate = "";
            if (lang === 'cs') {
                formattedDate = day + ". " + monthsCs[now.getMonth()] + " " + year + " " + hours + ":" + minutes + ":" + seconds;
            } else {
                formattedDate = monthsEn[now.getMonth()] + " " + day + ", " + year + " " + hours + ":" + minutes + ":" + seconds;
            }

            datetimeElement.textContent = formattedDate;
        }

        function changeLanguage() {
            const langSelect = document.getElementById('languageSelect');
            const headline = document.getElementById('headline');
            const errorMsg = document.querySelector('.logo-error-msg');
            
            if (!langSelect || !headline) return;
            const lang = langSelect.value;
            
            if (lang === 'cs') {
                headline.textContent = 'Něco se chystá';
                if (errorMsg) errorMsg.textContent = 'Sem vložte soubor s logem (logo.svg)';
            } else {
                headline.textContent = 'Something is brewing';
                if (errorMsg) errorMsg.textContent = 'Insert your logo file here (logo.svg)';
            }
            
            updateDateTime();
        }

        function handleLogoError() {
            const logo = document.getElementById('webLogo');
            const langSelect = document.getElementById('languageSelect');
            if (!logo) return;
            
            logo.style.display = 'none';
            const lang = langSelect ? langSelect.value : 'cs';
            const tipText = lang === 'cs' ? 'Sem vložte soubor s logem (logo.svg)' : 'Insert your logo file here (logo.svg)';
            
            if (logo.parentNode.querySelector('.logo-error-msg')) return;
            
            const placeholder = document.createElement('div');
            placeholder.className = 'logo-error-msg';
            placeholder.style.color = '#aaa';
            placeholder.style.fontStyle = 'italic';
            placeholder.style.fontSize = '14px';
            placeholder.style.border = '2px dashed #ddd';
            placeholder.style.padding = '20px';
            placeholder.style.borderRadius = '8px';
            placeholder.textContent = tipText;
            
            logo.parentNode.appendChild(placeholder);
        }

        // Spuštění hodinového cyklu
        updateDateTime();
        setInterval(updateDateTime, 1000);
    </script>
</body>
</html>
