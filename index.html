<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uora.pro - Něco se chystá</title>
    <style>
        /* Základní nastavení stránky */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9f9f9;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Společný styl pro horní a spodní lištu */
        .bar {
            background-color: #DAA520; /* Žlutá barva DAA520 */
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            font-weight: 500;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Horní lišta - upravené rozvržení */
        header {
            position: relative;
            justify-content: center; /* Vycentruje čas na střed */
            min-height: 50px;
        }
        
        /* Jazyky posunuté úplně doprava uvnitř lišty */
        .lang-switch {
            position: absolute;
            right: 20px;
        }
        
        /* Styl pro přepínač jazyků */
        .lang-switch select {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            outline: none;
            transition: background 0.3s;
        }
        .lang-switch select:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .lang-switch select option {
            color: #333;
            background: white;
        }

        /* Styl pro živé datum a čas uprostřed */
        #datetime {
            font-size: 14px;
            letter-spacing: 0.5px;
            text-align: center;
        }

        /* Hlavní středový obsah */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
        }

        /* Krátký nadpis */
        h1 {
            font-size: 2.8rem;
            margin-bottom: 25px;
            color: #222;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Točící se kolečko (Loader) */
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #DAA520;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            animation: spin 1s linear infinite;
            margin-bottom: 60px; /* Mezera pro posunutí loga níže */
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Styl pro SVG logo */
        .logo-placeholder {
            width: 100%;
            max-width: 250px;
            height: auto;
            display: block;
        }

        /* Spodní lišta vycentrovaná */
        footer {
            justify-content: center;
            font-size: 14px;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.05);
            text-align: center;
        }
    </style>
</head>
<body>

    <header class="bar">
        <div id="datetime">Načítání času...</div>
        
        <div class="lang-switch">
            <select id="languageSelect" onchange="changeLanguage()">
                <option value="cs">CZ</option>
                <option value="en">EN</option>
            </select>
        </div>
    </header>

    <main>
        <h1 id="headline">Něco se chystá</h1>
        
        <div class="loader"></div>
        
        <img class="logo-placeholder" src="logo.svg" alt="Naše Logo" id="webLogo" onerror="handleLogoError()">
    </main>

    <footer class="bar">
        <p>© 2025 - 2026 Všechna práva vyhrazena</p>
    </footer>
