<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank you | Uora.pro</title>
    <style>
        :root {
            --yellow: #DAA520;
            --beige: #FDF5E6;
            --red: #8B0000;
            --text-dark: #2C2C2C;
            --text-muted: #5F5F5F;
            --white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--beige);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .container {
            background: var(--white);
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 4px solid var(--red);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: var(--red);
            margin-bottom: 15px;
            font-size: 2.2rem;
        }

        p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .btn-back {
            display: inline-block;
            background-color: var(--yellow);
            color: var(--white);
            text-decoration: none;
            padding: 14px 30px;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-back:hover {
            background-color: #b8860b;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="thx-title">Thank you!</h1>
        <p id="thx-msg">Your email has been successfully registered. We will keep you updated about the project launch.</p>
        <a href="index.html" class="btn-back" id="thx-btn">Back to home</a>
    </div>

<script>
    // Načteme si jazyk, který si uživatel vybral na hlavní stránce
    const savedLang = localStorage.getItem('uora_lang') || 'en';
    
    if (savedLang === 'cs') {
        document.documentElement.lang = 'cs';
        document.title = "Děkujeme | Uora.pro";
        document.getElementById('thx-title').innerText = "Děkujeme!";
        document.getElementById('thx-msg').innerText = "Váš e-mail byl úspěšně zaregistrován k odběru. O spuštění projektu vás budeme informovat mezi prvními.";
        document.getElementById('thx-btn').innerText = "Zpět na hlavní stránku";
    }
</script>

</body>
</html>
